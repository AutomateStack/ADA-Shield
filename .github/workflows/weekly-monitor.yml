name: Weekly Monitor

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  trigger-scans:
    name: Trigger Weekly Scans
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly scan endpoint
        run: |
          # -sS: silent but show transport errors on stderr.
          # Capture curl exit code separately so we can still parse and print
          # the response body/status before deciding whether to fail.
          body=$(curl -sS --max-time 300 \
            -X POST "${{ secrets.API_URL }}/api/internal/trigger-weekly-scan" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_API_SECRET }}" \
            -w '\n__STATUS__%{http_code}')
          curl_exit=$?

          status=$(echo "$body" | tail -1 | sed 's/__STATUS__//')
          response_body=$(echo "$body" | sed '$d')

          echo "HTTP Status: $status"
          echo "Response: $response_body"

          if [ $curl_exit -ne 0 ]; then
            echo "curl failed with exit code $curl_exit (transport error)"
            exit 1
          fi

          if [ "$status" -ne 200 ]; then
            echo "Weekly scan trigger failed with status $status"
            exit 1
          fi

          echo "Weekly scans triggered successfully"
