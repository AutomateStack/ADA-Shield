name: Keep Alive

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping API
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -f "${{ secrets.API_URL }}/health" || echo "Ping failed — service may be starting"
